{% extends 'base.html' %}
{% block content %}
<h2>Student List</h2>
<a href="{% url 'student_add' %}" class="btn">Add New Student</a>
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student.student_id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>
            <a href="{% url 'student_edit' student.student_id %}" class="btn">Edit</a>
            <a href="{% url 'student_delete' student.student_id %}" class="btn btn-danger">Delete</a>
            <a href="{% url 'student_report' student.student_id %}" class="btn">Report</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
