<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SIS - Enrollments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">🎓 Student Info System</span>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'student_list' %}">Core Administration</a>
                <a class="nav-link active" href="{% url 'enrollment' %}">Enrollments</a>
                <a class="nav-link" href="{% url 'results' %}">Exams & Results</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm"><div class="card-header bg-primary text-white"><h5>Course Enrollment Bridge</h5></div><div class="card-body">
                    <form method="POST"><% csrf_token %>
                        <div class="mb-3"><label class="form-label">Student</label><select name="student_id" class="form-select">{% for s in students %}<option value="{{ s.student_id }}">{{ s.name }}</option>{% endfor %}</select></div>
                        <div class="mb-3"><label class="form-label">Target Course</label><select name="course_id" class="form-select">{% for c in courses %}<option value="{{ c.course_id }}">{{ c.course_name }}</option>{% endfor %}</select></div>
                        <button type="submit" class="btn btn-success w-100">Establish Relation</button></form>
                </div></div>
            </div>
            <div class="col-md-8"><table class="table table-striped bg-white rounded p-2"><thead><tr><th>ID</th><th>Student</th><th>Course Mapping</th><th>Action</th></tr></thead><tbody>
                {% for e in enrollments %}<tr><td>{{ e.enrollment_id }}</td><td>{{ e.student.name }}</td><td>{{ e.course.course_name }}</td><td><a href="{% url 'delete_enrollment' e.enrollment_id %}" class="btn btn-sm btn-danger">Drop Mapping</a></td></tr>{% endfor %}
            </tbody></table></div>
        </div>
    </div>
</body>
</html>
