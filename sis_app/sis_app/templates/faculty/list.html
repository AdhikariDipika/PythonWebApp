{% extends 'base.html' %}
{% block content %}
<h2>Faculty List</h2>
<a href="{% url 'faculty_add' %}" class="btn">Add New Faculty</a>
<table>
    <tr>
        <th>ID</th>
        <th>Faculty Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
    </tr>
    {% for prof in faculty %}
    <tr>
        <td>{{ prof.faculty_id }}</td>
        <td>{{ prof.faculty_name }}</td>
        <td>{{ prof.email }}</td>
        <td>{{ prof.phone }}</td>
        <td>
            <a href="{% url 'faculty_edit' prof.faculty_id %}" class="btn">Edit</a>
            <a href="{% url 'faculty_delete' prof.faculty_id %}" class="btn btn-danger">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5" style="text-align: center;">No faculty records found.</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
